// ===== PARSE =====
function parseAnswerSheet(text) {
  const circled = {'①':'1','②':'2','③':'3','④':'4','⑤':'5'};
  const results = {};

  // Normalize: replace multiple spaces/tabs with single space
  const normalized = text.replace(/\r/g,'').replace(/[ \t]+/g,' ');
  const lines = normalized.split('\n');

  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;

    // Pattern: "1) [정답] ④" or "1) [정답] 답안텍스트"
    const p1 = t.matchAll(/(\d+)\)\s*\[정답\]\s*([①②③④⑤]|[^\s\[]+)?/g);
    for (const m of p1) {
      const num = parseInt(m[1]);
      const raw = (m[2]||'').trim();
      if (num > 0) addQ(results, num, raw, circled);
    }

    // Pattern: "0631 ②" or "0631 ○" or "0631 ×" (inline multiple on one line)
    const p2 = t.matchAll(/\b(\d+)\s+([①②③④⑤○×])/g);
    for (const m of p2) {
      const num = parseInt(m[1]);
      const sym = m[2];
      if (num > 0) {
        if (sym==='○') addQ(results, num, 'O', circled);
        else if (sym==='×') addQ(results, num, 'X', circled);
        else addQ(results, num, sym, circled);
      }
    }

    // Pattern: "1) ④" or "1. ③"
    const p3 = t.match(/^(\d+)[).]\s*([①②③④⑤1-5])\s*$/);
    if (p3) {
      const num = parseInt(p3[1]);
      if (num > 0) addQ(results, num, p3[2], circled);
    }
  }

  const qs = Object.values(results).sort((a,b)=>a.number-b.number);
  return qs;
}

function addQ(results, num, raw, circled) {
  if (results[num]) return; // first occurrence wins
  let type, answer;
  if (circled[raw]) { type='multiple'; answer=circled[raw]; }
  else if (/^[1-5]$/.test(raw)) { type='multiple'; answer=raw; }
  else { type='short'; answer=raw; }
  results[num] = {number:num, type, answer};
}

function parseRange(rangeText, allQs) {
  if (!rangeText || !rangeText.trim() || rangeText.trim()==='전체') return allQs;
  const nums = new Set();
  for (const part of rangeText.split(',').map(p=>p.trim()).filter(Boolean)) {
    if (part.includes('-')) {
      const [s,e] = part.split('-').map(n=>parseInt(n.trim()));
      if (isNaN(s)||isNaN(e)) throw new Error(`잘못된 범위: ${part}`);
      if (s>e) throw new Error(`시작이 끝보다 큽니다: ${part}`);
      for (let i=s;i<=e;i++) nums.add(i);
    } else {
      const n = parseInt(part);
      if (isNaN(n)) throw new Error(`잘못된 번호: ${part}`);
      nums.add(n);
    }
  }
  return allQs.filter(q=>nums.has(q.number));
}

function genCode(existing) {
  let code, tries=0;
  do { code=String(Math.floor(1000+Math.random()*9000)); tries++; }
  while (existing.has(code) && tries<200);
  return code;
}

function allCodes(teachers, students) {

}

// ===== MATH INPUT =====
const MATH_ROWS = [
  ['√','∛','²','³','π','∞','±','×','÷'],
  ['≤','≥','≠','∈','∉','⊂','⊃','∪','∩'],
  ['①','②','③','④','⑤','ㄱ','ㄴ','ㄷ','ㄹ'],
];

function MathInput({value, onChange}) {
  const ref = useRef(null);
  const insert = (sym) => {
    const el = ref.current;
    if (!el) { onChange(value+sym); return; }
    const s = el.selectionStart, e = el.selectionEnd;
    const nv = value.slice(0,s)+sym+value.slice(e);
    onChange(nv);
    setTimeout(()=>{ el.selectionStart=el.selectionEnd=s+sym.length; el.focus(); },0);
  };
  const handleKeyUp = () => {
    let v = value;
    const rep = [[/\^2/g,'²'],[/\^3/g,'³'],[/sqrt/g,'√'],[/\bpi\b/g,'π'],[/<=/g,'≤'],[/>=/g,'≥'],[/!=/g,'≠'],[/\binf\b/g,'∞']];
    for (const [p,r] of rep) v=v.replace(p,r);
    if (v!==value) onChange(v);
  };
  return (
    <div>
      <textarea ref={ref} value={value} onChange={e=>onChange(e.target.value)} onKeyUp={handleKeyUp}
        placeholder="답안을 입력하세요..." rows={2}
        className="w-full border-2 border-gray-200 rounded-xl p-3 focus:outline-none focus:border-blue-500 resize-none text-sm"/>
      <div className="mt-1 border rounded-xl p-2 bg-gray-50">
        {MATH_ROWS.map((row,ri)=>(
          <div key={ri} className="flex flex-wrap gap-1 mb-1">
            {row.map(sym=>(
              <button key={sym} type="button" onClick={()=>insert(sym)}
                className="px-2 py-1 bg-white border border-gray-200 rounded text-sm hover:bg-blue-50 hover:border-blue-300 font-mono min-w-[2rem]">
                {sym}
              </button>
            ))}
          </div>
        ))}
      </div>
      <p className="text-xs text-gray-400 mt-1">단축키: ^2→² | sqrt→√ | pi→π | &lt;=→≤ | !=→≠ | inf→∞</p>
    </div>
  );
}

// ===== EDIT TEACHER FORM =====
function EditTeacherForm({teacher, allTeachers, allStudents, onSave, onCancel}) {
  const [name, setName] = useState(teacher.name);
  const [code, setCode] = useState(teacher.loginCode);
  const [err, setErr] = useState('');
  const save = () => {
    if (!name.trim()) { setErr('이름을 입력하세요.'); return; }
    if (!/^\d{4}$/.test(code)) { setErr('4자리 숫자여야 합니다.'); return; }
    const others = new Set([ADMIN_CODE,
      ...allTeachers.filter(t=>t.id!==teacher.id).map(t=>t.loginCode),
      ...allStudents.map(s=>s.loginCode)]);
    if (others.has(code)) { setErr('이미 사용 중인 코드입니다.'); return; }
    onSave({...teacher, name:name.trim(), loginCode:code});
  };
  return (
    <div className="bg-blue-50 rounded-xl px-4 py-3 border-2 border-blue-200">
      <div className="flex gap-2 mb-2">
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="이름"
          className="flex-1 border rounded-lg px-2 py-1 text-sm focus:outline-none focus:border-blue-500"/>
        <input value={code} onChange={e=>setCode(e.target.value)} placeholder="코드" maxLength={4}
          className="w-20 border rounded-lg px-2 py-1 text-sm font-mono focus:outline-none focus:border-blue-500"/>
      </div>
      {err && <p className="text-red-500 text-xs mb-2">{err}</p>}
      <div className="flex gap-2">
        <button onClick={onCancel} className="flex-1 py-1 border border-gray-300 text-gray-600 rounded-lg text-xs">취소</button>
        <button onClick={save} className="flex-1 py-1 bg-blue-500 text-white rounded-lg text-xs font-medium">저장</button>
      </div>
    </div>
  );
}

  const [newTErr, setNewTErr] = useState('');
  const [detailT, setDetailT] = useState(null);

  // ---- AUTH ----
  const doLogin = () => {
    setLoginErr('');

    if (!loginType) { setLoginErr('⚠️ 로그인 유형을 선택하세요.'); return; }
    if (loginType === 'teacher') {
      if (!code) { setLoginErr('⚠️ 코드를 입력하세요.'); return; }
      const t = teachers.find(t=>t.loginCode===code);
      if (!t) { setLoginErr('❌ 존재하지 않는 로그인 코드입니다.'); return; }
      setMe({role:'teacher', data:t}); setView('teacher'); setTTab('classes'); return;
    }
    if (loginType === 'student') {
      const name = loginName.trim();
      if (!name || !code) { setLoginErr('⚠️ 모든 항목을 입력해주세요.'); return; }
      const codeExists = students.some(s=>s.loginCode===code);
      const st = students.find(s=>s.name===name && s.loginCode===code);
      if (!st) {
        setLoginErr(codeExists ? '❌ 이름과 로그인 코드가 일치하지 않습니다.' : '❌ 존재하지 않는 로그인 코드입니다.');
        return;
      }
      setMe({role:'student', data:st}); setView('student'); return;
    }
  };

  const doLogout = () => {
    setMe(null); setView('login'); setLoginType(''); setLoginName(''); setLoginCode(''); setLoginErr('');
    setSelClass(null); setTSubView(''); setCurResult(null); setSelHW(null);
  };

  // ---- STUDENT ----
  const getMyHWs = () => {
    if (!me?.data) return [];
    const cls = classes.find(c=>c.id===me.data.classId);
    if (!cls) return [];
    return homeworks.filter(h=>cls.homeworkIds.includes(h.id));
  };
  const getMySub = (hwId) => submissions.find(s=>s.studentId===me?.data?.id && s.homeworkId===hwId);

  const selectHW = (hw) => {
    const sub = getMySub(hw.id);
    if (sub) { setCurResult(sub); setView('results'); return; }

  };

  const submitHW = () => {
    if (!selHW || !me?.data) return;
    const now = new Date();
    const details = {}; let correct=0,wrong=0,unanswered=0;
    for (const q of selHW.questions) {
      const ua = answers[q.number]||null;
      let status;
      if (!ua||ua.trim()==='') { status='unanswered'; unanswered++; }
      else if (q.type==='multiple') { status=ua===q.answer?'correct':'wrong'; status==='correct'?correct++:wrong++; }
      else { status=ua.trim()===q.answer.trim()?'correct':'wrong'; status==='correct'?correct++:wrong++; }

    const sub={
      id:now.getTime(), studentId:me.data.id, studentName:me.data.name,
      homeworkId:selHW.id, homework:selHW.title,
      correctCount:correct, wrongCount:wrong, unansweredCount:unanswered, details,

    setClasses(p=>[...p,nc]);

  };

  // ---- TEACHER - Students ----
  const addStudentFn = () => {
    setNsErr('');
    if (!nsName.trim()||!nsSchool||!nsGrade) { setNsErr('모든 항목을 입력하세요.'); return; }
    const codes = allCodes(teachers, students);
    let code;
    if (nsMode==='auto') { code=genCode(codes); }
    else {
      code=nsManual.trim();
      if (!/^\d{4}$/.test(code)) { setNsErr('4자리 숫자여야 합니다.'); return; }

      for (let i=1;i<=pdf.numPages;i++) {

    setTeachers(p=>[...p,{id:`t_${Date.now()}`,name:newTName.trim(),loginCode:code,classIds:[]}]);

  const delTeacher = (tid) => {

  const updateTeacher = (t) => { setTeachers(p=>p.map(x=>x.id===t.id?t:x)); setEditT(null); };

  // ---- STATS ----
  const classStats = (classId) => {
    const cls = classes.find(c=>c.id===classId);
    if (!cls) return [];
    const clsStudents = students.filter(s=>cls.studentIds.includes(s.id));
    return homeworks.filter(h=>cls.homeworkIds.includes(h.id)).map(hw=>{
      const subs = submissions.filter(s=>s.homeworkId===hw.id);
      const submittedIds = new Set(subs.map(s=>s.studentId));
      const notSubmitted = clsStudents.filter(s=>!submittedIds.has(s.id));
      const qStats={};
      hw.questions.forEach(q=>{
        const wrong=subs.filter(s=>{const d=s.details[q.number];return d&&(d.status==='wrong'||d.status==='unanswered');}).length;
        qStats[q.number]={number:q.number,type:q.type,wrongCount:wrong,wrongRate:subs.length>0?Math.round(wrong/subs.length*100):0};
      });
      const top5=Object.values(qStats).sort((a,b)=>b.wrongRate-a.wrongRate).slice(0,5);
      const avg=subs.length>0?Math.round(subs.reduce((a,s)=>a+s.correctCount,0)/subs.length):0;
      return {hw,subs,notSubmitted,clsStudents,top5,avg};
    });

  // ---- TEACHER CLASSES (derived) ----
  const myClasses = () => {

        <div className="bg-white border-b">
          <div className="max-w-5xl mx-auto flex">
            {[['classes','📚 클래스'],['homework','📝 숙제'],['submissions','📊 제출 현황']].map(([id,label])=>(

        <div className="max-w-5xl mx-auto p-4">

          {/* ── CLASSES TAB ── */}
          {tTab==='classes' && !selClass && (
            tSubView==='addClass' ? (
              <div className="bg-white rounded-2xl shadow-sm p-5 max-w-md">
                <h2 className="font-semibold text-gray-700 mb-4">새 클래스 만들기</h2>
                <input type="text" value={newCls} onChange={e=>setNewCls(e.target.value)} placeholder="클래스 이름 (예: 고1 수학A반)"
                  className="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 mb-3"/>
                {clsErr&&<p className="text-red-500 text-sm mb-3">{clsErr}</p>}
                <div className="flex gap-2">
                  <button onClick={()=>{setTSubView('');setClsErr('');}} className="flex-1 py-2 border-2 border-gray-200 text-gray-600 rounded-xl">취소</button>
                  <button onClick={addClassFn} className="flex-1 py-2 bg-blue-500 text-white rounded-xl font-semibold">생성</button>

          {tTab==='classes' && selClass && (

              {tSubView==='addStudent' ? (

                      <div>
                        <label className="text-xs text-gray-500 mb-1 block">숙제 제목</label>
                        <input type="text" value={hwTitle} onChange={e=>setHwTitle(e.target.value)} placeholder="예: 01 지수함수"
                          className="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500"/>
                      </div>
                      <div className="flex gap-2">
                        {[['quick','⚡ PDF/텍스트'],['manual','✏️ 수동 입력']].map(([m,l])=>(
                          <button key={m} onClick={()=>setHwMethod(m)} className={`flex-1 py-2 rounded-lg text-sm font-medium border-2 ${hwMethod===m?'border-blue-500 bg-blue-50 text-blue-600':'border-gray-200 text-gray-500'}`}>{l}</button>
                        ))}
                      </div>

                      {hwMethod==='quick' && (
                        <div>
                          <div onDragOver={e=>{e.preventDefault();setIsDrag(true);}} onDragLeave={()=>setIsDrag(false)} onDrop={handleDrop}
                            className={`border-2 border-dashed rounded-xl p-6 text-center mb-3 transition-all ${isDrag?'border-blue-400 bg-blue-50':'border-gray-300'}`}>
                            {pdfLoad ? <p className="text-blue-500 text-sm">PDF 읽는 중...</p> : (
                              <div>
                                <p className="text-gray-400 text-sm mb-2">📄 PDF 파일을 여기에 드래그하거나</p>
                                <label className="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm inline-block">
                                  파일 선택
                                  <input type="file" accept=".pdf" className="hidden" onChange={e=>readPDF(e.target.files[0])}/>
                                </label>
                              </div>
                            )}
                          </div>
                          <p className="text-xs text-gray-400 mb-2">또는 텍스트 직접 붙여넣기:</p>
                          <textarea value={hwPaste} onChange={e=>setHwPaste(e.target.value)} rows={8}
                            placeholder={"1) [정답] ④\n2) [정답] ⑤\n3) [정답] ④\n...\n또는\n0631 ②  0632 −15  0633 ①"}
                            className="w-full border-2 border-gray-200 rounded-xl p-3 text-sm font-mono focus:outline-none focus:border-purple-500 resize-none"/>
                          {hwErr&&<p className="text-red-500 text-sm mt-1">{hwErr}</p>}
                          <button onClick={parseFn} disabled={!hwPaste.trim()||!hwTitle.trim()}
                            className="mt-2 w-full bg-purple-500 hover:bg-purple-600 disabled:bg-gray-300 text-white py-2.5 rounded-xl text-sm font-semibold">
                            ⚡ 자동 파싱하기
                          </button>
                          {!hwTitle.trim()&&<p className="text-xs text-orange-500 mt-1 text-center">※ 제목을 먼저 입력하세요</p>}
                        </div>
                      )}

                      {hwMethod==='manual' && (
                        <div>
                          <div className="flex items-center gap-3 mb-3">
                            <label className="text-sm text-gray-600">문항 수</label>
                            <input type="number" value={hwManualCnt} min={1} max={200}
                              onChange={e=>setHwManualCnt(Math.max(1,Math.min(200,Number(e.target.value))))}
                              className="border-2 border-gray-200 rounded-lg px-3 py-1.5 text-sm w-20 focus:outline-none focus:border-blue-500"/>
                            <button onClick={()=>setHwManualQs(Array.from({length:hwManualCnt},(_,i)=>({number:i+1,type:'multiple',answer:''})))}
                              className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-1.5 rounded-lg text-sm font-medium">문항 생성</button>
                          </div>
                          {hwManualQs.length>0 && (
                            <div>
                              <div className="border rounded-xl overflow-hidden max-h-72 overflow-y-auto">
                                <table className="w-full text-sm">
                                  <thead className="bg-gray-50 sticky top-0">
                                    <tr>{['번호','유형','정답'].map(h=><th key={h} className="px-3 py-2 text-left text-xs text-gray-500 font-medium">{h}</th>)}</tr>
                                  </thead>
                                  <tbody className="divide-y">
                                    {hwManualQs.map((q,i)=>(
                                      <tr key={i}>
                                        <td className="px-3 py-2 text-gray-500 text-xs">{q.number}</td>
                                        <td className="px-3 py-2">
                                          <select value={q.type} onChange={e=>{const u=[...hwManualQs];u[i]={...q,type:e.target.value,answer:''};setHwManualQs(u);}} className="border rounded px-1 py-0.5 text-xs">
                                            <option value="multiple">객관식</option><option value="short">주관식</option>
                                          </select>
                                        </td>
                                        <td className="px-3 py-2">
                                          {q.type==='multiple'?(
                                            <select value={q.answer} onChange={e=>{const u=[...hwManualQs];u[i]={...q,answer:e.target.value};setHwManualQs(u);}} className="border rounded px-1 py-0.5 text-xs">
                                              <option value="">선택</option>{[1,2,3,4,5].map(n=><option key={n} value={String(n)}>{n}번</option>)}
                                            </select>
                                          ):(
                                            <input type="text" value={q.answer} onChange={e=>{const u=[...hwManualQs];u[i]={...q,answer:e.target.value};setHwManualQs(u);}}
                                              placeholder="답안" className="border rounded px-1 py-0.5 text-xs w-24"/>
                                          )}
                                        </td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                              {hwErr&&<p className="text-red-500 text-sm mt-2">{hwErr}</p>}
                              <button onClick={()=>saveHW(hwManualQs)} disabled={!hwTitle.trim()}
                                className="mt-3 w-full bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 text-white py-2.5 rounded-xl text-sm font-semibold">저장</button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}

                  {hwStep===2 && hwParsed && (
                    <div className="space-y-4">
                      <div className={`rounded-xl p-3 text-sm ${hwWarns.length>0?'bg-yellow-50 border border-yellow-200':'bg-green-50 border border-green-200'}`}>
                        <p className={`font-semibold ${hwWarns.length>0?'text-yellow-700':'text-green-700'}`}>✅ {hwParsed.length}개 문제 인식됨</p>
                        {hwWarns.map((w,i)=><p key={i} className="text-yellow-600 text-xs mt-1">⚠️ {w}</p>)}
                      </div>
                      <div>
                        <label className="text-sm font-medium text-gray-700 mb-1 block">문항 범위 선택</label>
                        <p className="text-xs text-gray-400 mb-2">예: 전체 / 85-107 / 85-107, 145 / 1-10, 15, 20-25</p>
                        <input type="text" value={hwRange} onChange={e=>setHwRange(e.target.value)} placeholder="비워두면 전체 문항"
                          className="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500"/>
                        {hwRangeErr&&<p className="text-red-500 text-xs mt-1">❌ {hwRangeErr}</p>}
                      </div>
                      <div className="flex gap-2">
                        <button onClick={()=>setHwStep(1)} className="flex-1 py-2 border-2 border-gray-200 text-gray-600 rounded-xl text-sm">← 이전</button>
                        <button onClick={applyRange} className="flex-1 py-2 bg-blue-500 text-white rounded-xl text-sm font-semibold">다음 →</button>
                      </div>
                    </div>
                  )}

                  {hwStep===3 && hwFiltered && (
                    <div className="space-y-4">
                      <div className="bg-blue-50 rounded-xl p-3 text-sm">
                        <p className="font-semibold text-blue-700">📋 {hwTitle}</p>
                        <p className="text-blue-600 text-xs mt-1">총 {hwFiltered.length}문항 · 객관식 {hwFiltered.filter(q=>q.type==='multiple').length} · 주관식 {hwFiltered.filter(q=>q.type==='short').length}</p>
                      </div>
                      <div className="border rounded-xl overflow-hidden max-h-72 overflow-y-auto">
                        <table className="w-full text-sm">
                          <thead className="bg-gray-50 sticky top-0">
                            <tr>{['번호','유형','정답'].map(h=><th key={h} className="px-3 py-2 text-left text-xs text-gray-500 font-medium">{h}</th>)}</tr>
                          </thead>
                          <tbody className="divide-y">
                            {hwFiltered.map((q,i)=>(
                              <tr key={i} className={!q.answer?'bg-yellow-50':''}>
                                <td className="px-3 py-2 text-gray-500 text-xs">{q.number}</td>
                                <td className="px-3 py-2">
                                  <select value={q.type} onChange={e=>{const u=[...hwFiltered];u[i]={...q,type:e.target.value,answer:''};setHwFiltered(u);}} className="border rounded px-1 py-0.5 text-xs">
                                    <option value="multiple">객관식</option><option value="short">주관식</option>
                                  </select>
                                </td>
                                <td className="px-3 py-2">
                                  {q.type==='multiple'?(
                                    <select value={q.answer} onChange={e=>{const u=[...hwFiltered];u[i]={...q,answer:e.target.value};setHwFiltered(u);}} className={`border rounded px-1 py-0.5 text-xs ${!q.answer?'border-yellow-400':''}`}>
                                      <option value="">선택</option>{[1,2,3,4,5].map(n=><option key={n} value={String(n)}>{n}번</option>)}
                                    </select>
                                  ):(
                                    <input type="text" value={q.answer} onChange={e=>{const u=[...hwFiltered];u[i]={...q,answer:e.target.value};setHwFiltered(u);}}
                                      placeholder="답안" className={`border rounded px-1 py-0.5 text-xs w-24 ${!q.answer?'border-yellow-400':''}`}/>
                                  )}
                                  {!q.answer&&<span className="text-yellow-400 ml-1 text-xs">⚠️</span>}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      {hwFiltered.some(q=>!q.answer)&&(
                        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-sm text-yellow-700">⚠️ 답안이 비어있는 문항이 있습니다. 위 표에서 직접 수정하세요.</div>
                      )}
                      <div className="flex gap-2">
                        <button onClick={()=>setHwStep(2)} className="flex-1 py-2 border-2 border-gray-200 text-gray-600 rounded-xl text-sm">← 이전</button>
                        <button onClick={()=>saveHW(hwFiltered)} className="flex-1 py-2 bg-blue-500 text-white rounded-xl text-sm font-semibold">✓ 숙제 내기</button>
                      </div>
                    </div>
                  )}
                </div>
              ) : (
                <div>
                  <div className="flex items-center gap-3 mb-4">
                    <button onClick={()=>setSelClass(null)} className="text-sm text-gray-500 hover:text-gray-700">← 클래스 선택</button>
                    <h3 className="font-bold text-gray-800">{selClass.name}</h3>
                  </div>
                  <div className="space-y-3">
                    {homeworks.filter(h=>selClass.homeworkIds.includes(h.id)).map(hw=>{
                      const mc=hw.questions.filter(q=>q.type==='multiple').length;
                      const sc=hw.questions.filter(q=>q.type==='short').length;
                      return (
                        <div key={hw.id} className="bg-white rounded-2xl shadow-sm p-4 flex items-center justify-between">
                          <div><p className="font-medium text-gray-700">{hw.title}</p><p className="text-xs text-gray-400">{hw.questions.length}문제 (객관식 {mc}, 주관식 {sc})</p></div>
                          <button onClick={()=>delHW(hw.id)} className="text-red-400 hover:text-red-600 text-xs">삭제</button>
                        </div>
                      );
                    })}
                    {homeworks.filter(h=>selClass.homeworkIds.includes(h.id)).length===0&&(
                      <div className="bg-white rounded-2xl p-6 text-center text-gray-400">등록된 숙제가 없습니다.</div>
                    )}
                    <button onClick={()=>{setTSubView('addHomework');resetHWForm();}}
                      className="w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 rounded-2xl hover:border-blue-300 hover:text-blue-500">+ 숙제 추가</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ── SUBMISSIONS TAB ── */}
          {tTab==='submissions' && (
            <div className="space-y-4">
              {!selClass ? (
                <div className="bg-white rounded-2xl shadow-sm p-5">
                  <h3 className="font-semibold text-gray-700 mb-3">클래스 선택</h3>
                  <div className="space-y-2">
                    {tClasses.map(cls=>(
                      <button key={cls.id} onClick={()=>setSelClass(cls)}
                        className="w-full flex items-center justify-between bg-gray-50 rounded-xl px-4 py-3 hover:bg-blue-50 transition-colors">
                        <span className="font-medium">📚 {cls.name}</span>
                        <span className="text-sm text-gray-400">{students.filter(s=>cls.studentIds.includes(s.id)).length}명</span>
                      </button>
                    ))}
                    {tClasses.length===0&&<p className="text-gray-400 text-sm text-center py-4">클래스가 없습니다.</p>}
                  </div>
                </div>
              ) : (
                <div>
                  <div className="flex items-center gap-3 mb-4">
                    <button onClick={()=>setSelClass(null)} className="text-sm text-gray-500 hover:text-gray-700">← 클래스 선택</button>
                    <h3 className="font-bold text-gray-800">{selClass.name}</h3>
                  </div>
                  {classStats(selClass.id).map(({hw,subs,notSubmitted,clsStudents,top5,avg})=>(
                    <div key={hw.id} className="bg-white rounded-2xl shadow-sm p-5 mb-4">
                      <div className="flex items-center justify-between mb-3">
                        <h4 className="font-semibold text-gray-800">📝 {hw.title}</h4>
                        <span className={`text-sm font-medium ${subs.length===clsStudents.length?'text-green-600':'text-orange-500'}`}>{subs.length}/{clsStudents.length}명 제출</span>
                      </div>
                      {subs.length>0&&<p className="text-xs text-gray-400 mb-3">평균: {avg}/{hw.questions.length}문제</p>}
                      {subs.length>0&&(
                        <div className="mb-3">
                          <p className="text-xs font-medium text-green-600 mb-2">✅ 제출 완료 ({subs.length}명)</p>
                          <div className="space-y-1">
                            {subs.map(sub=>(
                              <div key={sub.id} className="flex items-center justify-between bg-green-50 rounded-lg px-3 py-2 text-sm">
                                <span className="font-medium text-gray-700">{sub.studentName}</span>
                                <div className="flex gap-3 text-xs">
                                  <span className="text-green-600">맞음 {sub.correctCount}</span>
                                  <span className="text-red-500">틀림 {sub.wrongCount}</span>
                                  <span className="text-gray-400">모름 {sub.unansweredCount}</span>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                      {notSubmitted.length>0&&(
                        <div className="mb-3">
                          <p className="text-xs font-medium text-red-500 mb-2">❌ 미제출 ({notSubmitted.length}명)</p>
                          <div className="flex flex-wrap gap-2">
                            {notSubmitted.map(s=><span key={s.id} className="bg-red-50 text-red-500 text-xs px-2 py-1 rounded-lg">{s.name}</span>)}
                          </div>
                        </div>
                      )}
                      {subs.length>0&&top5.length>0&&(
                        <div>
                          <p className="text-xs font-medium text-gray-500 mb-2">📊 오답률 높은 문항 TOP 5</p>
                          <div className="space-y-1.5">
                            {top5.map(s=>(
                              <div key={s.number} className="flex items-center gap-2 text-xs">
                                <span className="text-gray-500 w-12 flex-shrink-0">{s.number}번</span>
                                <span className="text-gray-400 w-10 flex-shrink-0">{s.type==='multiple'?'객관식':'주관식'}</span>
                                <div className="flex-1 bg-gray-100 rounded-full h-1.5">
                                  <div className="bg-red-400 h-1.5 rounded-full" style={{width:`${s.wrongRate}%`}}/>
                                </div>
                                <span className="text-red-500 font-medium w-10 text-right">{s.wrongRate}%</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                      {subs.length===0&&notSubmitted.length>0&&<p className="text-gray-400 text-sm text-center py-2">아직 제출된 답안이 없습니다.</p>}
                    </div>
                  ))}
                  {classStats(selClass.id).length===0&&<div className="bg-white rounded-2xl p-8 text-center text-gray-400">등록된 숙제가 없습니다.</div>}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ADMIN
  if (view==='admin') return (
    <div className="min-h-screen bg-gray-50">
      <div className="bg-white shadow-sm p-4">
        <div className="max-w-5xl mx-auto flex items-center justify-between">
          <div><h1 className="text-xl font-bold text-gray-800">관리자 페이지</h1><p className="text-sm text-gray-400">시스템 전체 관리</p></div>
          <button onClick={doLogout} className="text-sm text-gray-500 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50">로그아웃</button>
        </div>
      </div>
      <div className="bg-white border-b">
        <div className="max-w-5xl mx-auto flex">
          {[['teachers','👨‍🏫 선생님 관리'],['students','👥 전체 학생']].map(([id,label])=>(
            <button key={id} onClick={()=>{setATab(id);setDetailT(null);}}
              className={`px-6 py-3 text-sm font-medium border-b-2 transition-colors ${aTab===id?'border-blue-500 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>{label}</button>
          ))}
        </div>
      </div>
      <div className="max-w-5xl mx-auto p-4">

        {aTab==='teachers' && !detailT && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-white rounded-2xl shadow-sm p-5">
              <h2 className="font-semibold text-gray-700 mb-4">선생님 추가</h2>
              <div className="space-y-3">
                <div><label className="text-xs text-gray-500 mb-1 block">이름</label>
                  <input type="text" value={newTName} onChange={e=>setNewTName(e.target.value)} placeholder="선생님 이름"
                    className="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500"/></div>
                <div><label className="text-xs text-gray-500 mb-1 block">로그인 코드</label>
                  <div className="flex gap-2 mb-2">
                    {['auto','manual'].map(m=>(
                      <button key={m} onClick={()=>setNewTMode(m)} className={`flex-1 py-1.5 rounded-lg border-2 text-sm ${newTMode===m?'border-blue-500 bg-blue-50 text-blue-600':'border-gray-200 text-gray-500'}`}>{m==='auto'?'자동 생성':'직접 입력'}</button>
                    ))}
                  </div>
                  {newTMode==='manual'&&<input type="text" value={newTManual} onChange={e=>setNewTManual(e.target.value)} placeholder="4자리 숫자" maxLength={4}
                    className="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500"/>}
                </div>
                {newTErr&&<p className="text-red-500 text-xs">{newTErr}</p>}
                <button onClick={addTeacher} className="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg text-sm font-medium">+ 선생님 추가</button>
              </div>
            </div>
            <div className="bg-white rounded-2xl shadow-sm p-5">
              <h2 className="font-semibold text-gray-700 mb-4">선생님 목록</h2>
              <div className="space-y-2 max-h-96 overflow-y-auto">
                {teachers.map(t=>(
                  editT?.id===t.id ? (
                    <EditTeacherForm key={t.id} teacher={t} allTeachers={teachers} allStudents={students} onSave={updateTeacher} onCancel={()=>setEditT(null)}/>
                  ) : (
                    <div key={t.id} className="bg-gray-50 rounded-xl px-4 py-3">
                      <div className="flex items-center justify-between">
                        <div>
                          <span className="font-medium text-gray-700">{t.name}</span>
                          <span className="text-xs font-mono bg-blue-50 text-blue-600 px-2 py-0.5 rounded ml-2">코드: {t.loginCode}</span>
                        </div>
                        <div className="flex gap-2 text-xs">
                          <button onClick={()=>setDetailT(t)} className="text-blue-500 hover:text-blue-700">상세</button>
                          <button onClick={()=>setEditT(t)} className="text-gray-500 hover:text-gray-700">수정</button>
                          <button onClick={()=>delTeacher(t.id)} className="text-red-400 hover:text-red-600">삭제</button>
                        </div>
                      </div>
                      <p className="text-xs text-gray-400 mt-1">클래스 {t.classIds.length}개 · 학생 {students.filter(s=>classes.filter(c=>t.classIds.includes(c.id)).some(c=>c.studentIds.includes(s.id))).length}명</p>
                    </div>
                  )
                ))}
                {teachers.length===0&&<p className="text-gray-400 text-sm text-center py-4">등록된 선생님이 없습니다.</p>}
              </div>
            </div>
          </div>
        )}

        {aTab==='teachers' && detailT && (
          <div>
            <button onClick={()=>setDetailT(null)} className="text-sm text-gray-500 hover:text-gray-700 mb-4 block">← 목록</button>
            <div className="bg-white rounded-2xl shadow-sm p-5">
              <h2 className="font-bold text-gray-800 text-lg mb-4">{detailT.name} 선생님 상세 정보</h2>
              {classes.filter(c=>detailT.classIds.includes(c.id)).map(cls=>{
                const clsStudents=students.filter(s=>cls.studentIds.includes(s.id));
                const clsHWs=homeworks.filter(h=>cls.homeworkIds.includes(h.id));
                return (
                  <div key={cls.id} className="mb-5">
                    <h3 className="font-semibold text-gray-700 mb-2">📚 {cls.name} ({clsStudents.length}명)</h3>
                    {clsHWs.map(hw=>{
                      const subs=submissions.filter(s=>s.homeworkId===hw.id);
                      return (
                        <div key={hw.id} className="bg-gray-50 rounded-xl px-4 py-3 mb-2 flex justify-between text-sm">
                          <span className="font-medium">{hw.title}</span>
                          <span className={subs.length===clsStudents.length?'text-green-600':'text-orange-500'}>제출 {subs.length}/{clsStudents.length}명</span>
                        </div>
                      );
                    })}
                    {clsHWs.length===0&&<p className="text-xs text-gray-400 mb-2">숙제 없음</p>}
                  </div>
                );
              })}
              {classes.filter(c=>detailT.classIds.includes(c.id)).length===0&&<p className="text-gray-400 text-sm">클래스가 없습니다.</p>}
            </div>
          </div>
        )}

        {aTab==='students' && (
          <div className="bg-white rounded-2xl shadow-sm p-5">
            <h2 className="font-semibold text-gray-700 mb-4">전체 학생 목록 ({students.length}명)</h2>
            <div className="space-y-2">
              {students.map(s=>{
                const cls=classes.find(c=>c.id===s.classId);
                const teacher=cls?teachers.find(t=>t.id===cls.teacherId):null;
                return (
                  <div key={s.id} className="flex items-center justify-between bg-gray-50 rounded-xl px-4 py-3">
                    <div>
                      <span className="font-medium text-gray-700">{s.name}</span>
                      <span className="text-xs text-gray-400 ml-2">{s.schoolType} {s.grade}학년</span>
                    </div>
                    <div className="text-right text-xs text-gray-400">
                      <p>{cls?.name||'-'} · {teacher?.name||'-'} 선생님</p>
                      <span className="font-mono bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded">코드: {s.loginCode}</span>
                    </div>
                  </div>
                );
              })}
              {students.length===0&&<p className="text-gray-400 text-sm text-center py-4">등록된 학생이 없습니다.</p>}
            </div>
          </div>
        )}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
